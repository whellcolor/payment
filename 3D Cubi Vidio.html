<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>3D Video Cube</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    perspective:1200px;
    font-family:Arial, sans-serif;
}

/* Tombol */
.btn{
    position:absolute;
    top:30px;
    z-index:100;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:cyan;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px cyan;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.1);
}

/* Scene */
.scene{
    width:300px;
    height:300px;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s linear infinite;
}

/* Cube */
.cube{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
}

/* Semua sisi */
.face{
    position:absolute;
    width:300px;
    height:300px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.2);
    box-shadow:
        0 0 20px cyan,
        inset 0 0 20px cyan;
    background:#111;
}

/* Video */
.face video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Posisi sisi */
.front  { transform:translateZ(150px); }
.back   { transform:rotateY(180deg) translateZ(150px); }
.right  { transform:rotateY(90deg) translateZ(150px); }
.left   { transform:rotateY(-90deg) translateZ(150px); }
.top    { transform:rotateX(90deg) translateZ(150px); }
.bottom { transform:rotateX(-90deg) translateZ(150px); }

/* Animasi */
@keyframes spin{
    0%{
        transform:rotateX(0deg) rotateY(0deg);
    }
    100%{
        transform:rotateX(360deg) rotateY(360deg);
    }
}

/* Background Glow */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle,
    rgba(0,255,255,0.2),
    transparent 70%);
    animation:pulse 3s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
        opacity:0.4;
    }
    to{
        transform:scale(1.3);
        opacity:1;
    }
}
</style>
</head>

<body>

<button class="btn" onclick="playVideos()">
    ▶ VIEW VIDEO
</button>

<div class="scene">
    <div class="cube">

        <!-- Ganti video sesuai keinginan -->

        <div class="face front">
            <video loop muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>

        <div class="face back">
            <video loop muted>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
        </div>

        <div class="face right">
            <video loop muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>

        <div class="face left">
            <video loop muted>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
        </div>

        <div class="face top">
            <video loop muted>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
        </div>

        <div class="face bottom">
            <video loop muted>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
        </div>

    </div>
</div>

<script>
function playVideos(){

    const videos = document.querySelectorAll("video");

    videos.forEach(video => {
        video.play();
    });

}
</script>

</body>
</html>
