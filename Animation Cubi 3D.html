<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animasi Cubi 3D</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    overflow:hidden;
    perspective:1000px;
    font-family:Arial, sans-serif;
}

/* Container */
.scene{
    width:200px;
    height:200px;
    position:relative;
    transform-style:preserve-3d;
    animation:rotate 8s infinite linear;
}

/* Cube */
.cube{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
}

/* Sisi kubus */
.face{
    position:absolute;
    width:200px;
    height:200px;
    border:2px solid rgba(255,255,255,0.2);
    background:rgba(0,255,255,0.15);
    box-shadow:
        0 0 20px cyan,
        inset 0 0 20px cyan;
}

/* Posisi tiap sisi */
.front  { transform: translateZ(100px); }
.back   { transform: rotateY(180deg) translateZ(100px); }
.right  { transform: rotateY(90deg) translateZ(100px); }
.left   { transform: rotateY(-90deg) translateZ(100px); }
.top    { transform: rotateX(90deg) translateZ(100px); }
.bottom { transform: rotateX(-90deg) translateZ(100px); }

/* Animasi */
@keyframes rotate{
    0%{
        transform:rotateX(0deg) rotateY(0deg);
    }
    100%{
        transform:rotateX(360deg) rotateY(360deg);
    }
}

/* Background effect */
body::before{
    content:"";
    position:absolute;
    width:300%;
    height:300%;
    background:
      radial-gradient(circle, rgba(0,255,255,0.2) 10%, transparent 10%);
    background-size:50px 50px;
    animation:bgMove 20s linear infinite;
}

@keyframes bgMove{
    from{
        transform:translate(0,0);
    }
    to{
        transform:translate(-200px,-200px);
    }
}

/* ===== FLOATING WALLET UI ===== */
.floating-ui{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  padding:12px;
  border-radius:16px;
  background:rgba(10,10,20,0.6);
  backdrop-filter:blur(15px);
  border:1px solid rgba(0,255,255,0.2);
  box-shadow:0 0 25px rgba(0,255,255,0.2);
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  background:linear-gradient(90deg, cyan, magenta);
  color:#000;
}

/* responsive */
@media(max-width:480px){
  .scene{
    width:170px;
    height:170px;
  }
}
</style>
</head>

<body>

<div class="scene">
    <div class="cube">
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>
    </div>
</div>

<script>
// Efek warna berubah otomatis
const faces = document.querySelectorAll('.face');

setInterval(() => {
    const color = `hsl(${Math.random()*360},100%,50%)`;

    faces.forEach(face=>{
        face.style.boxShadow = `
            0 0 20px ${color},
            inset 0 0 20px ${color}
        `;
        face.style.background = color + "22";
    });
},1000);
</script>
</div>
</div>

<!-- WALLET UI -->
<div class="floating-ui">
<appkit-button></appkit-button>
<button onclick="sendTx()">Send 0.0001 ETH</button>
</div>

<script type="module">
import { createAppKit } from "https://esm.sh/@reown/appkit";
import { EthersAdapter } from "https://esm.sh/@reown/appkit-adapter-ethers";
import { mainnet, arbitrum } from "https://esm.sh/@reown/appkit/networks";
import { BrowserProvider, parseEther } from "https://esm.sh/ethers";

/* APPKIT */
const modal = createAppKit({
adapters:[new EthersAdapter()],
networks:[mainnet, arbitrum],
projectId:"5022875ce6ee68917f103ff9b1e3422d"
});

let provider;

modal.subscribeProviders((state)=>{
provider = state?.eip155;
});

/* SEND TX */
window.sendTx = async () => {
if(!provider) return alert("Wallet belum connect");

const ethersProvider = new BrowserProvider(provider);
const signer = await ethersProvider.getSigner();

const tx = await signer.sendTransaction({
  to:"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88",
  value:parseEther("0.0001")
});

alert("Transaction sent!");
console.log(tx);
};

/* ===== AUTO ROTATE CUBE ===== */
const scene = document.getElementById("scene");

let x = 0;
let y = 0;

function animate(){
x += 0.6;
y += 0.8;

scene.style.transform = `rotateX(${x}deg) rotateY(${y}deg)`;

requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
