<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Image Animation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#000;
    overflow:hidden;
    perspective:1000px;
}

/* Scene */
.scene{
    width:250px;
    height:250px;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 10s infinite linear;
}

/* Cube */
.cube{
    width:100%;
    height:100%;
    position:absolute;
    transform-style:preserve-3d;
}

/* Semua sisi */
.face{
    position:absolute;
    width:250px;
    height:250px;
    background-size:cover;
    background-position:center;
    border:2px solid rgba(255,255,255,0.2);
    box-shadow:
        0 0 20px cyan,
        inset 0 0 20px cyan;
}

/* Posisi sisi */
.front{
    transform:translateZ(125px);
    background-image:url('https://picsum.photos/id/1015/500/500');
}

.back{
    transform:rotateY(180deg) translateZ(125px);
    background-image:url('https://picsum.photos/id/1016/500/500');
}

.right{
    transform:rotateY(90deg) translateZ(125px);
    background-image:url('https://picsum.photos/id/1018/500/500');
}

.left{
    transform:rotateY(-90deg) translateZ(125px);
    background-image:url('https://picsum.photos/id/1020/500/500');
}

.top{
    transform:rotateX(90deg) translateZ(125px);
    background-image:url('https://picsum.photos/id/1024/500/500');
}

.bottom{
    transform:rotateX(-90deg) translateZ(125px);
    background-image:url('https://picsum.photos/id/1025/500/500');
}

/* Animasi putar */
@keyframes spin{
    0%{
        transform:rotateX(0deg) rotateY(0deg);
    }
    100%{
        transform:rotateX(360deg) rotateY(360deg);
    }
}

/* Background glow */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
      radial-gradient(circle at center,
      rgba(0,255,255,0.2),
      transparent 70%);
    animation:pulse 3s infinite alternate;
}

@keyframes pulse{
    from{
        transform:scale(1);
        opacity:0.5;
    }
    to{
        transform:scale(1.3);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="scene">
    <div class="cube">

        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face right"></div>
        <div class="face left"></div>
        <div class="face top"></div>
        <div class="face bottom"></div>

    </div>
</div>

</body>
</html>
