<script>

const receiver =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

let provider;
let signer;

/* Connect Wallet */

async function connectWallet(){

    if(!window.ethereum){
        alert("Install MetaMask / Trust Wallet");
        return;
    }

    try{

        provider =
            new ethers.providers.Web3Provider(window.ethereum);

        await provider.send(
            "eth_requestAccounts",
            []
        );

        signer = provider.getSigner();

        const address =
            await signer.getAddress();

        document.getElementById("wallet")
        .innerHTML =
            "CONNECTED:<br>" + address;

        await switchPolygon();

    }catch(err){

        alert(err.message);

    }
}

/* Switch Polygon */

async function switchPolygon(){

    try{

        await window.ethereum.request({
            method:"wallet_switchEthereumChain",
            params:[{ chainId:"0x89" }]
        });

    }catch(switchError){

        if(switchError.code === 4902){

            await window.ethereum.request({
                method:"wallet_addEthereumChain",
                params:[{
                    chainId:"0x89",
                    chainName:"Polygon Mainnet",
                    nativeCurrency:{
                        name:"MATIC",
                        symbol:"MATIC",
                        decimals:18
                    },
                    rpcUrls:[
                        "https://polygon-rpc.com"
                    ],
                    blockExplorerUrls:[
                        "https://polygonscan.com"
                    ]
                }]
            });

        }
    }
}

/* Pay ETH */

async function payETH(){

    if(!signer){
        alert("Connect wallet dulu");
        return;
    }

    try{

        const tx =
            await signer.sendTransaction({

                to:receiver,

                value:
                ethers.utils.parseEther("0.9")

            });

        alert(
            "Transaction Sent:\n" +
            tx.hash
        );

    }catch(err){

        alert(
            "Payment failed:\n" +
            err.message
        );

    }
}

/* Dummy USDT */

async function payUSDT(){

    alert(
        "Tambahkan smart contract USDT Polygon/BSC."
    );

}

/* Copy */

function copyAddress(){

    navigator.clipboard.writeText(receiver);

    alert("Address copied");

}

</script>
<script>

const receiver =
"0xd8519A8b8825Aa0DcC73aAD572f447FAE102fe88";

/* ALCHEMY RPC */
const ALCHEMY_RPC =
"https://eth-mainnet.g.alchemy.com/v2/5P3go2AF1svTq0QqCOZUQ";

let provider;
let signer;

/* Connect Wallet */

async function connectWallet(){

    if(!window.ethereum){
        alert("Install MetaMask / Trust Wallet");
        return;
    }

    try{

        /* Wallet Provider */
        provider =
            new ethers.providers.Web3Provider(window.ethereum);

        /* Request Account */
        await provider.send(
            "eth_requestAccounts",
            []
        );

        signer = provider.getSigner();

        const address =
            await signer.getAddress();

        document.getElementById("wallet")
        .innerHTML =
            "CONNECTED:<br>" + address;

        /* Optional:
           Alchemy Provider for reading blockchain
        */

        const alchemyProvider =
            new ethers.providers.JsonRpcProvider(
                ALCHEMY_RPC
            );

        const block =
            await alchemyProvider.getBlockNumber();

        console.log(
            "Current ETH Block:",
            block
        );

    }catch(err){

        alert(err.message);

    }
}

/* Pay ETH */

async function payETH(){

    if(!signer){
        alert("Connect wallet dulu");
        return;
    }

    try{

        const tx =
            await signer.sendTransaction({

                to:receiver,

                value:
                ethers.utils.parseEther("0.9")

            });

        alert(
            "Transaction Sent:\n" +
            tx.hash
        );

    }catch(err){

        alert(
            "Payment failed:\n" +
            err.message
        );

    }
}

</script>
